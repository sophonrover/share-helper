<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
      --accent: #fbbf24;
      --accent-soft: rgba(251, 191, 36, 0.15);
      --transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: var(--bg-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* Background texture */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: 
        radial-gradient(rgba(148, 163, 184, 0.05) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 1;
    }

    .slide-container {
      position: absolute;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: translateY(20px) scale(0.98);
      transition: opacity var(--transition), transform var(--transition);
      pointer-events: none;
      z-index: 2;
    }

    .slide-container.active {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .slide-container.exit {
      opacity: 0;
      transform: translateY(-20px) scale(1.02);
      transition: opacity 0.4s ease-out, transform 0.4s ease-out;
      pointer-events: none;
    }

    .slide {
      max-width: 960px;
      width: 90%;
      padding: 60px 80px;
      position: relative;
    }

    /* Navigation */
    .nav-edge {
      position: fixed;
      top: 0;
      height: 100vh;
      width: 20%;
      cursor: pointer;
      z-index: 10;
    }
    #prev-nav { left: 0; }
    #next-nav { right: 0; }

    /* Progress indicator */
    .progress {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
    }
    .progress-dot {
      width: 8px;
      height: 8px;
      border-radius: 4px;
      background: rgba(148, 163, 184, 0.3);
      transition: all var(--transition);
    }
    .progress-dot.active {
      width: 24px;
      background: var(--accent);
    }

    /* Typography */
    h1 {
      font-size: 56px;
      font-weight: 700;
      line-height: 1.05;
      color: var(--text-primary);
      margin-bottom: 24px;
      letter-spacing: -0.03em;
    }
    h2 {
      font-size: 40px;
      font-weight: 600;
      line-height: 1.1;
      color: var(--text-primary);
      margin-bottom: 48px;
      letter-spacing: -0.02em;
    }
    h3 {
      font-size: 24px;
      font-weight: 400;
      color: var(--accent);
      margin-bottom: 16px;
      letter-spacing: -0.01em;
      text-transform: uppercase;
    }
    p, li {
      font-size: 18px;
      font-weight: 300;
      line-height: 1.7;
      color: var(--text-secondary);
    }
    strong {
      font-weight: 600;
      color: var(--text-primary);
    }
    ul {
      list-style: none;
      counter-reset: item;
    }
    li {
      counter-increment: item;
      margin-bottom: 24px;
      padding-left: 44px;
      position: relative;
    }
    li::before {
      content: counter(item);
      position: absolute;
      left: 0; top: 4px;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 14px;
      font-weight: 600;
      display: grid;
      place-items: center;
    }
    .subtitle {
      font-size: 22px;
      font-weight: 400;
      color: var(--text-secondary);
      margin-top: 16px;
    }
    .tag {
      display: inline-block;
      padding: 8px 16px;
      border: 1px solid var(--accent);
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 999px;
      font-size: 14px;
      font-weight: 500;
      margin-top: 32px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      margin-top: 24px;
    }
    .card {
      background: var(--bg-secondary);
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
    }
    .card h4 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
    }
    .center {
      text-align: center;
    }
    .accent-text {
      color: var(--accent);
    }
  </style>
</head>
<body>

  <div class="nav-edge" id="prev-nav"></div>
  <div class="nav-edge" id="next-nav"></div>

{{slides}}

  <div class="progress" id="progress">
    <!-- Dots injected by JS -->
  </div>

  <script>
    const slides = document.querySelectorAll('.slide-container');
    const progressEl = document.getElementById('progress');
    let current = 0;
    let transitioning = false;

    // Create progress dots
    slides.forEach((_, i) => {
      const dot = document.createElement('div');
      dot.className = 'progress-dot' + (i === 0 ? ' active' : '');
      progressEl.appendChild(dot);
    });
    const dots = document.querySelectorAll('.progress-dot');

    function updateProgress() {
      dots.forEach((dot, i) => {
        dot.classList.toggle('active', i === current);
      });
    }

    function go(n) {
      if (transitioning || n < 0 || n >= slides.length) return;
      transitioning = true;

      slides[current].classList.remove('active');
      slides[current].classList.add('exit');
      current = n;
      slides[current].classList.remove('exit');
      slides[current].classList.add('active');
      updateProgress();

      setTimeout(() => {
        transitioning = false;
      }, 600);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(current + 1);
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(current - 1);
    });

    document.getElementById('prev-nav').addEventListener('click', () => go(current - 1));
    document.getElementById('next-nav').addEventListener('click', () => go(current + 1));
  </script>
</body>
</html>
